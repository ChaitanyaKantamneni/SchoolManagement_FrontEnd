<div>
  <app-dashboard-top-nav></app-dashboard-top-nav>
</div>
<div class="MainContentDiv">
  <div class="w-100">
    <div class="AddForm">
      <div class="AddFormTop">
        <button type="button" class="salary-pay-top-spacer" tabindex="-1" aria-hidden="true">
          <mat-icon>arrow_circle_left</mat-icon>
        </button>
        <p>SALARY PAY</p>
      </div>
      <div class="AddFormConatiner">
        <div class="FormInputRowsContainer">
          <div class="InputRow">
            <div class="InputFieldsContainer" *ngIf="isAdmin">
              <label class="inputLabel">School <span class="required">*</span></label>
              <div class="input-with-error">
                <select class="inputField" [ngModel]="selectedSchoolID" (ngModelChange)="selectedSchoolID = $event" (change)="onAdminSchoolChange($event)">
                  <option value="">-- Select School --</option>
                  <option *ngFor="let school of schoolList" [value]="school.ID">{{ school.Name }}</option>
                </select>
              </div>
            </div>
            <div class="InputFieldsContainer">
              <label class="inputLabel">Academic Year <span class="required">*</span></label>
              <div class="input-with-error">
                <select class="inputField" [(ngModel)]="selectedAcademicYearID">
                  <option value="">-- Select Academic Year --</option>
                  <option *ngFor="let year of academicYearList" [value]="year.ID">{{ year.Name }}</option>
                </select>
              </div>
            </div>
          </div>
          <div class="InputRow">
            <div class="InputFieldsContainer">
              <label class="inputLabel">Staff <span class="required">*</span></label>
              <div class="input-with-error">
                <select class="inputField" [(ngModel)]="form.staffName">
                  <option *ngFor="let staff of staffList" [value]="staff">{{ staff }}</option>
                </select>
              </div>
            </div>
            <div class="InputFieldsContainer">
              <label class="inputLabel">Payment Mode <span class="required">*</span></label>
              <div class="input-with-error">
                <select class="inputField" [(ngModel)]="form.paymentMode">
                  <option *ngFor="let mode of paymentModes" [value]="mode">{{ mode }}</option>
                </select>
              </div>
            </div>
          </div>
          <div class="InputRow">
            <div class="InputFieldsContainer">
              <label class="inputLabel">Start Date <span class="required">*</span></label>
              <div class="input-with-error">
                <input class="inputField" type="date" [(ngModel)]="form.startDate" />
              </div>
            </div>
            <div class="InputFieldsContainer">
              <label class="inputLabel">End Date <span class="required">*</span></label>
              <div class="input-with-error">
                <input class="inputField" type="date" [(ngModel)]="form.endDate" />
              </div>
            </div>
          </div>
        </div>

        <div class="salary-pay-fetch-row">
          <button type="button" class="btn-salary-fetch" (click)="getSalaryDetails()">Get Salary Details</button>
        </div>

        <div *ngIf="salaryDetails" class="salary-pay-summary">
          <p><b>Gross:</b> {{ salaryDetails.gross }}</p>
          <p><b>Deductions:</b> {{ salaryDetails.deduction }}</p>
          <p><b>Net Pay:</b> {{ salaryDetails.net }}</p>
        </div>

        <div class="ActionButtons">
          <button type="button" (click)="paySalary()">Pay Salary</button>
        </div>
      </div>
    </div>
  </div>
</div>
