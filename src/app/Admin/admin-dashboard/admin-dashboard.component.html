<app-dashboard-top-nav [shellMode]="true"></app-dashboard-top-nav>

<div class="totalcard">
  <aside class="sidenavbar" [ngClass]="{'collapsed': !isExpanded, 'mobile-open': isMobileMenuOpen}">
    <div class="sidebar-mobile-bar">
      <div class="sidebar-user-info">
        <div class="sidebar-avatar">{{ userInitial }}</div>
        <div class="sidebar-user-copy">
          <span>{{ userLabel }}</span>
          <small>{{ workspaceLabel }}</small>
        </div>
      </div>
      <button class="icon-btn close-btn" type="button" (click)="toggleSidebar()" aria-label="Close sidebar">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="logo">
      <a>
        <img src="Images/Logo1.jpg" alt="School ERP" />
      </a>
    </div>

    <div class="sidebar" role="navigation" aria-label="Admin sidebar">
      <p class="menu-caption">Main Navigation</p>
      <ul class="menu">
        <li>
          <a routerLink="/Admin/Dashboad" routerLinkActive="active">
            <mat-icon>dashboard</mat-icon>
            <span class="DashboardMenuLi">Dashboard</span>
          </a>
        </li>

        <li
          class="menu-item has-submenu"
          *ngFor="let module of getVisibleModules()"
          [ngClass]="{'is-open': openedSubmenu === module.id.toString()}"
        >
          <div class="parent-row" (click)="toggleSubmenu(module.id.toString())">
            <mat-icon>{{ getModuleIcon(module.moduleName) }}</mat-icon>
            <span class="DashboardMenuLi">{{ module.moduleName }}</span>
            <mat-icon class="submenu-arrow">expand_more</mat-icon>
          </div>

          <ul *ngIf="openedSubmenu === module.id.toString()" class="submenu">
            <li *ngFor="let page of getVisiblePages(module)">
              <a (click)="navigate(page, $event)" [ngClass]="{'active': isPageActive(page)}">
                <mat-icon>{{ getPageIcon(page.pageName) }}</mat-icon>
                <span class="submenu-text">{{ page.pageName }}</span>
              </a>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </aside>

  <div class="sidebar-backdrop" [class.visible]="isMobileMenuOpen" (click)="toggleSidebar()" aria-hidden="true"></div>

  <main class="maincontent">
    <router-outlet class="full-page-content"></router-outlet>
  </main>

  <nav class="mobile-bottom-nav" aria-label="Mobile navigation">
    <button type="button" class="mobile-nav-item" [class.active]="activeMobileSection === 'dashboard'" (click)="goToDashboard()">
      <mat-icon>dashboard</mat-icon>
      <span>Dashboard</span>
    </button>

    <button
      *ngIf="hasVisibleModule('masters')"
      type="button"
      class="mobile-nav-item"
      [class.active]="activeMobileSection === (findVisibleModule('masters')?.id?.toString() || '')"
      (click)="openMobileSection((findVisibleModule('masters')?.id?.toString() || ''))"
    >
      <mat-icon>widgets</mat-icon>
      <span>Masters</span>
    </button>

    <button
      *ngIf="hasVisibleModule('academic')"
      type="button"
      class="mobile-nav-item"
      [class.active]="activeMobileSection === (findVisibleModule('academic')?.id?.toString() || '')"
      (click)="openMobileSection((findVisibleModule('academic')?.id?.toString() || ''))"
    >
      <mat-icon>school</mat-icon>
      <span>Academics</span>
    </button>

    <button
      *ngIf="findVisibleModuleByNames(['timetable', 'time table'])"
      type="button"
      class="mobile-nav-item"
      [class.active]="activeMobileSection === (findVisibleModuleByNames(['timetable', 'time table'])?.id?.toString() || '')"
      (click)="openMobileSection((findVisibleModuleByNames(['timetable', 'time table'])?.id?.toString() || ''))"
    >
      <mat-icon>schedule</mat-icon>
      <span>Timetable</span>
    </button>

    <button type="button" class="mobile-nav-item" [class.active]="isMobileMenuOpen" (click)="toggleSidebar()">
      <mat-icon>menu</mat-icon>
      <span>Menu</span>
    </button>
  </nav>
</div>
