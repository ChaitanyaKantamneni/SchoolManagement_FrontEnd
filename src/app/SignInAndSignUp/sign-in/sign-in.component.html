<!-- ✅ PRODUCTION-READY LOGIN FORM - FULLY RESPONSIVE -->
<div class="Maincontainer">
  <div class="contentwrapper">
    
    <!-- Logo Section - Shows on desktop, mobile (with responsive scaling) -->
    <div class="loginIconDiv">
      <div class="loginIconImg">
        <img src="Images/Logo4.png" alt="School Logo">
      </div>
    </div>

    <!-- Form Section -->
    <div class="loginFormDiv">
      <div class="loginFormInputsDiv">
        <h2>Welcome Back!</h2>
        <p>Enter your login credentials to access your account</p>
        
        <form [formGroup]="LoginForms">
          
          <!-- 📧 Email Field -->
          <div class="InputFieldsContainer">
            <label class="inputLabel" for="email">Email</label>
            <div class="input-with-error">
              <input 
                class="inputField" 
                type="email" 
                id="email" 
                formControlName="email" 
                placeholder="Enter your email address" 
              />
              <div 
                *ngIf="LoginForms.get('email')?.touched && LoginForms.get('email')?.invalid" 
                class="text-danger"
              >
                <small *ngIf="LoginForms.get('email')?.errors?.['required']">
                  Email is required.
                </small>
                <small *ngIf="LoginForms.get('email')?.errors?.['email']">
                  Please enter a valid email address.
                </small>
              </div>
            </div>
          </div>

          <!-- 🔐 Password Field -->
          <div class="InputFieldsContainer">
            <label class="inputLabel" for="password">Password</label>
            <div class="input-with-error">
              <div class="passwordInputContainer">
                <input 
                  [type]="IsPasswordVisible ? 'text' : 'password'" 
                  class="inputField" 
                  id="password" 
                  formControlName="password" 
                  placeholder="Enter your password" 
                />
                <mat-icon 
                  class="passwordIcon" 
                  (click)="togglePasswordVisibility()"
                >
                  {{ IsPasswordVisible ? 'visibility' : 'visibility_off' }}
                </mat-icon>
              </div>
              <div 
                *ngIf="LoginForms.get('password')?.touched && LoginForms.get('password')?.invalid" 
                class="text-danger"
              >
                <small *ngIf="LoginForms.get('password')?.errors?.['required']">
                  Password is required.
                </small>
              </div>
            </div>
          </div>

          <!-- 🔒 Captcha Verification -->
          <div class="Captcha">
            <canvas id="captchaCanvas" class="Captcha-canvas"></canvas>
            <button 
              mat-icon-button 
              (click)="generateCaptcha()" 
              type="button"
              title="Refresh captcha"
            >
              <mat-icon>refresh</mat-icon>
            </button>
            <div class="loginFieldInputCaptcha">
              <input 
                class="CaptchainputField" 
                formControlName="Captcha" 
                placeholder="Enter captcha text"
              />
            </div>
          </div>

          <!-- 🔘 Form Actions -->
          <div class="loginFormButtons">
            <button 
              class="loginBtn" 
              type="button"
              (click)="OnSubmitSignIn()"
            >
              Log In
            </button>
            <button 
              class="forgotPasswordBtn" 
              type="button"
              (click)="OnForgotpasswordClick()"
            >
              Forgot Password?
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
